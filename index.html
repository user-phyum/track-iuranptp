     <h1 id="pageTitle" class="text-3xl font-bold text-white mb-3">Tracking Pembayaran</h1>

     <div class="space-y-5 mb-6">

       <div id="resultContent"></div>

     <div class="card-glass rounded-xl p-4 inline-block">
      <p class="text-gray-600 text-sm mb-2">Belum melakukan pembayaran?</p><a id="formLink" href="https://forms.gle/qZKuVj3M1xzzFwBD9" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 text-blue-600 font-semibold hover:text-blue-700 transition-colors">
       <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
       </svg><span id="formLinkText">Isi Form Pembayaran di sini</span>
       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />

  <script>
    // Data dari Google Sheet (akan di-fetch otomatis)
    let paymentData = [];
    const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx1QBA2PuHuv93PA1ufCKctYWuFRVfnYExzA0PX4AR8O78o4T3RM20M0Wfa1fJ02mWS/exec";

    // Fetch data dari Google Sheet
    async function loadPaymentData() {
      try {
        const response = await fetch(GOOGLE_APPS_SCRIPT_URL);
        const data = await response.json();
        paymentData = data;
        console.log("Data loaded from Google Sheet:", paymentData);
        // Populate dropdown setelah data loaded
        updateHouseNumbersFromData();
      } catch (error) {
        console.error("Error loading data from Google Sheet:", error);
        // Fallback ke data kosong jika error
        paymentData = [];
      }
    }

    // List of house numbers (complete list - sesuai urutan yang diberikan)
    const houseNumbers = [
      "A-1", "A-2", "A-3", "A-5", "A-6", "A-7", "A-8", "A-10", "A-11", "A-12 (Kantor Pemasaran)",
      "A-14", "A-15", "A-17", "A-18", "A-19", "A-20", "A-21", "A-22", "A-23", "A-24", "A-25",
      "A-26", "A-27", "A-28", "A-29", "A-30", "A-31", "A-32", "A-35", "A-36", "A-37",
      "B-1", "B-2", "B-6", "B-8", "B-9", "B-10", "B-11", "B-12", "B-12A", "B-12B", "B-15",
      "B-16", "B-17", "B-18", "B-19", "B-20", "B-21", "B-22", "B-26", "B-27", "B-28", "B-31",
      "B-32", "B-33", "B-34", "B-35", "B-36", "B-37", "B-40", "B-41", "B-42", "B-43", "B-46",
      "B-47", "B-48", "B-50", "B-50A",
      "C-1", "C-2", "C-3", "C-4", "C-5", "C-8", "C-9", "C-10", "C-11", "C-12", "C-12A",
      "C-15", "C-16", "C-17", "C-18", "C-19", "C-20", "C-22", "C-23", "C-24", "C-25", "C-26", "C-28",
      "D-1", "D-3", "D-7", "D-8", "D-9", "D-10", "D-11", "D-11A", "D-12", "D-13", "D-14",
      "D-15", "D-16", "D-16A", "D-17", "D-18", "D-19", "D-20", "D-22", "D-23A", "D-24", "D-25",
      "D-27", "D-28", "D-30", "D-31",
      "E-1", "E-2", "E-3", "E-4", "E-6", "E-8", "E-9", "E-10", "E-12", "E-13", "E-14",
      "E-15", "E-17", "E-18", "E-19", "E-22", "E-23", "E-25", "E-28",
      "F-1", "F-2", "F-3", "F-7", "F-8", "F-9", "F-10", "F-12A", "F-14", "F-15", "F-16",
      "F-17", "F-18", "F-21", "F-22", "F-23", "F-24", "F-25",
      "G-1", "G-5", "G-6", "G-9", "G-10", "G-12", "G-14", "G-17", "G-21"
    ];

    // Default config
    const defaultConfig = {
      page_title: "Tracking Pembayaran",
      form_link_text: "Isi Form Pembayaran di sini",
      background_color: "#0f172a",
      card_color: "#ffffff",
      text_color: "#1f2937",
      primary_color: "#3b82f6",
      secondary_color: "#10b981"
    };

    // Populate house number dropdown
    function populateHouseNumbers() {
      const select = document.getElementById('nomorRumah');
      // Clear existing options (keep placeholder)
      const options = select.querySelectorAll('option');
      for (let i = options.length - 1; i > 0; i--) {
        options[i].remove();
      }

      houseNumbers.forEach(num => {
        const option = document.createElement('option');
        option.value = num;
        option.textContent = num;
        select.appendChild(option);
      });
    }

    // Update house numbers dari Google Sheet data
    function updateHouseNumbersFromData() {
      // Jangan ubah urutan dari houseNumbers - gunakan urutan yang sudah fixed
      populateHouseNumbers();
    }

    // Search payment status
    function searchPayment() {
      const nomorRumah = document.getElementById('nomorRumah').value;
      const bulan = document.getElementById('bulan').value;
      const tahun = document.getElementById('tahun').value;
      const resultSection = document.getElementById('resultSection');
      const resultContent = document.getElementById('resultContent');

      // Validation
      if (!nomorRumah || !bulan || !tahun) {
        resultSection.classList.remove('hidden');
        resultContent.innerHTML = `
          <div class="bg-yellow-50 border-2 border-yellow-200 rounded-xl p-4 flex items-start gap-3">
            <svg class="w-6 h-6 text-yellow-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <div>
              <p class="font-semibold text-yellow-800">Lengkapi Data</p>
              <p class="text-yellow-700 text-sm mt-1">Silakan pilih nomor rumah, bulan, dan tahun terlebih dahulu.</p>
            </div>
          </div>
        `;
        return;
      }

      // Search in data
      const found = paymentData.find(
        p => p.nomorRumah === nomorRumah && p.bulan === bulan && p.tahun === tahun
      );

      resultSection.classList.remove('hidden');

      if (found) {
        // Payment found
        resultContent.innerHTML = `
          <div class="status-paid rounded-xl p-5 text-white fade-in">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <div class="flex-1">
                <h4 class="text-xl font-bold">Pembayaran Sudah Dilakukan ✓</h4>
                <div class="mt-3 space-y-1 text-white/90 text-sm">
                  <p><span class="font-medium">Nomor Rumah:</span> ${nomorRumah}</p>
                  <p><span class="font-medium">Periode:</span> ${bulan} ${tahun}</p>
                </div>
                <a href="${found.kuitansi}" target="_blank" rel="noopener noreferrer" class="mt-4 inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-colors text-sm font-medium">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                  </svg>
                  Lihat Kuitansi Pembayaran
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                  </svg>
                </a>
              </div>
            </div>
          </div>
        `;
      } else {
        // Payment not found
        resultContent.innerHTML = `
          <div class="status-unpaid rounded-xl p-5 text-white fade-in">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <div class="flex-1">
                <h4 class="text-xl font-bold">Pembayaran Belum Dilakukan</h4>
                <div class="mt-3 space-y-1 text-white/90 text-sm">
                  <p><span class="font-medium">Nomor Rumah:</span> ${nomorRumah}</p>
                  <p><span class="font-medium">Periode:</span> ${bulan} ${tahun}</p>
                </div>
                <p class="mt-3 text-white/80 text-sm">Data pembayaran untuk periode ini tidak ditemukan dalam sistem.</p>
                <a href="https://forms.gle/qZKuVj3M1xzzFwBD9" target="_blank" rel="noopener noreferrer" class="mt-4 inline-flex items-center gap-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-colors text-sm font-medium">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                  </svg>
                  Lakukan Pembayaran Sekarang
                </a>
              </div>
            </div>
          </div>
        `;
      }
    }

    // Element SDK integration
    async function onConfigChange(config) {
      document.getElementById('pageTitle').textContent = config.page_title || defaultConfig.page_title;
      document.getElementById('formLinkText').textContent = config.form_link_text || defaultConfig.form_link_text;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); }
          },
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ["page_title", config.page_title || defaultConfig.page_title],
        ["form_link_text", config.form_link_text || defaultConfig.form_link_text]
      ]);
    }

    // Initialize
    loadPaymentData();
    
    // Update current date
    function updateCurrentDate() {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const today = new Date();
      const formatter = new Intl.DateTimeFormat('id-ID', options);
      const dateString = formatter.format(today);
      document.getElementById('currentDate').textContent = `${dateString.charAt(0).toUpperCase() + dateString.slice(1)}`;
    }
    updateCurrentDate();
    
    document.getElementById('searchBtn').addEventListener('click', searchPayment);
    document.getElementById('clearBtn').addEventListener('click', function() {
      document.getElementById('nomorRumah').value = '';
      document.getElementById('bulan').value = '';
      document.getElementById('tahun').value = '';
      document.getElementById('resultSection').classList.add('hidden');
    });

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
